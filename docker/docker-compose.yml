version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-staging_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - staging_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-staging_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  staging_db_data:
